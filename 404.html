<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>頁面不存在｜Smart V 智成教育中心</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://smartv.hk/" />
  <link rel="icon" href="/favicon.ico?v=logo-20260617" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --ink:#16294a; --ink-soft:#44557a; --blue:#15539e; --paper:#f7f9fd; --line:#d8e1ef; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:"Noto Sans TC",system-ui,-apple-system,sans-serif; color:var(--ink);
      background:radial-gradient(720px 360px at 12% 0%, rgba(41,166,255,.10), transparent 64%), var(--paper); padding:24px; }
    .e404 { max-width:560px; text-align:center; }
    .e404 img { width:72px; height:auto; margin:0 auto 22px; display:block; }
    .e404 .code { font-family:"Noto Serif TC",serif; font-weight:900; letter-spacing:.06em; color:var(--blue); font-size:15px; margin:0 0 6px; }
    .e404 h1 { font-family:"Noto Serif TC",serif; font-size:clamp(28px,6vw,44px); line-height:1.2; margin:0 0 10px; }
    .e404 p { color:var(--ink-soft); font-size:17px; line-height:1.75; margin:0 0 28px; }
    .e404__actions { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
    .e404 a { display:inline-block; padding:12px 22px; border-radius:999px; text-decoration:none; font-weight:500; transition:transform .15s ease; }
    .e404 a:hover { transform:translateY(-1px); }
    .e404 a.primary { background:var(--blue); color:#fff; }
    .e404 a.ghost { border:1px solid var(--line); color:var(--ink); }
  </style>
</head>
<body>
  <main class="e404">
    <img src="/assets/logo-web.webp?v=claude-v7-20260610" alt="Smart V Learning Centre 智成教育中心" width="72" height="99" />
    <p class="code">404 · 頁面不存在</p>
    <h1>搵唔到呢一頁</h1>
    <p>你要搵嘅頁面可能已經移除，或者網址有誤。<br />可以返回首頁，或直接前往天后／坑口分校頁面。</p>
    <div class="e404__actions">
      <a class="primary" href="/">返回首頁</a>
      <a class="ghost" href="/tin-hau/">天后分校</a>
      <a class="ghost" href="/hang-hau/">坑口分校</a>
    </div>
  </main>
</body>
</html>
